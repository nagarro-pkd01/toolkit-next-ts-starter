name: Lighthouse CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lhci:
    name: Run LHCI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Try a clean install first; fall back to `npm install` if lockfile mismatch occurs
        run: npm ci || npm install --no-audit --no-fund

      - name: Run Lighthouse CI (autorun)
        # Use npx without pinning to avoid ETARGET errors for unavailable versions
        run: npx -y @lhci/cli autorun --config=.lighthouserc.js --upload.target=temporary-public-storage
